services:
  qa-bot:
    build: .
    image: qa-bot:latest
    env_file: .env
    environment:
      # container is an isolated sandbox → allow claude --dangerously-skip-permissions as root
      - IS_SANDBOX=1
      - QA_GOTCHAS_FILE=/app/QA_GOTCHAS.md
    restart: unless-stopped
    volumes:
      - ./runs:/app/runs
      - ./QA_GOTCHAS.md:/app/QA_GOTCHAS.md
